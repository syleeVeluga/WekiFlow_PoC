name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable corepack (pnpm 10.33.0, pinned in package.json)
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # build must run before typecheck: workspace types resolve via dist.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test
